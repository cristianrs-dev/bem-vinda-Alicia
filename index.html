<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vinda Alícia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Uma Nova Vida Está Chegando 💖</h1>
    <p>Homenagem especial a nossa queria Alícia</p>
  </header>

  <div class="container">

      <div class="mensagem">
        <p>
          Desde que soubemos da sua chegada, nossos corações se encheram de alegria.
          Você já é muito amada antes mesmo de nascer.
        </p>

        <p>
          Alícia, você é muito amada. Que Deus abençoe cada momento.
        </p>
      </div>

      <h2>Chá Revelação</h2>
  </div>

  <div class="gallery">

    <div class="main">
      <img id="mainImage">
      <button class="prev">❮</button>
      <button class="next">❯</button>
    </div>

    <div class="thumbs" id="thumbs"></div>

  </div>
  
   <footer>
    <p>Com amor, da sua família 💕</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
